<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RenderKit API - Authentication</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .auth-card {
        max-width: 480px;
        margin: 0 auto;
      }
      .auth-form { display: grid; gap: 1rem; }
      .auth-form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 800;
        color: var(--text);
      }
      .auth-form input {
        width: 100%;
        padding: 1rem;
        background: #000;
        color: #fff;
        border: 3px solid #fff;
        font: inherit;
        border-radius: 4px;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      .auth-form input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .auth-toggle {
        margin-top: 1.5rem;
        color: var(--text-dim);
        font-size: 0.95rem;
        text-align: center;
      }
      .auth-toggle button {
        background: none;
        border: none;
        color: var(--accent);
        font-weight: 800;
        cursor: pointer;
        text-decoration: underline;
        font-size: 0.9rem;
      }
      .auth-toggle button:hover { color: #fff; }
      .auth-error {
        display: none;
        background: rgba(255,68,68,0.1);
        border: 1px solid #ff4444;
        color: #ff4444;
        padding: 0.75rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-top: 1rem;
      }
      .auth-success {
        display: none;
        background: rgba(0,255,65,0.1);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 0.75rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-top: 1rem;
      }
      .loading-spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 3px solid rgba(0,255,65,0.2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 0.5rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .password-strength {
        height: 4px;
        background: #222;
        border-radius: 2px;
        margin-top: 0.5rem;
        overflow: hidden;
      }
      .password-strength .fill {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        transition: width 0.3s, background 0.3s;
      }
      .password-strength .fill.weak { width: 33%; background: #ff4444; }
      .password-strength .fill.medium { width: 66%; background: #ffaa00; }
      .password-strength .fill.strong { width: 100%; background: var(--accent); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">RENDER<span>KIT</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="playground.html">Playground</a>
            <a href="docs.html">Docs</a>
        </div>
    </nav>

    <main class="container" style="padding: 4rem 0 8rem;">
        <div class="auth-card">
            <div class="hero" style="padding: 0; margin-bottom: 2rem;">
                <div class="section-tag">Authentication</div>
                <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem;">
                    <span id="auth-title">Sign In</span>
                </h1>
                <p id="auth-subtitle" style="color: var(--text-dim); font-size: 1rem; margin: 0;">
                    Access your RenderKit dashboard and API keys.
                </p>
            </div>

            <div class="brutal-card" style="padding: 2rem;">
                <div id="auth-error" class="auth-error"></div>
                <div id="auth-success" class="auth-success"></div>

                <form id="auth-form" class="auth-form" novalidate>
                    <div>
                        <label for="auth-email">Email</label>
                        <input id="auth-email" type="email" required placeholder="you@example.com" autocomplete="email" />
                    </div>
                    <div>
                        <label for="auth-password">Password</label>
                        <input id="auth-password" type="password" required placeholder="••••••••" minlength="6" autocomplete="current-password" />
                        <div id="password-strength" class="password-strength" style="display:none;">
                            <div class="fill"></div>
                        </div>
                    </div>
                    <button id="auth-submit" type="submit" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1rem;">
                        Sign In
                    </button>
                </form>

                <div class="auth-toggle">
                    <span id="toggle-text">New to RenderKit?</span>
                    <button id="toggle-auth" type="button">Create Account</button>
                </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
